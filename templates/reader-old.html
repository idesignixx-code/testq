<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 قارئ الترجمة - Reader</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
        }

        body {
            font-family: 'Arabic Typesetting', 'Simplified Arabic', Arial, sans-serif;
            background: #ffffff;
            color: #333333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.dark-mode {
            background: #1a1a1a;
            color: #ffffff;
        }

        .menu-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .menu-button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .menu-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
            transform: translateX(300px);
            transition: transform 0.3s;
            z-index: 998;
            overflow-y: auto;
            padding: 20px;
        }

        body.dark-mode .menu-panel {
            background: #2a2a2a;
            color: white;
        }

        .menu-panel.open {
            transform: translateX(0);
        }

        .menu-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--primary);
        }

        .menu-title {
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            text-align: right;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        body.dark-mode .menu-item {
            background: #3a3a3a;
        }

        .menu-item:hover {
            background: var(--primary);
            color: white;
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
        }

        .toggle-switch.active {
            background: var(--primary);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            right: 2px;
            transition: right 0.3s;
        }

        .toggle-switch.active::after {
            right: 26px;
        }

        .lang-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            padding: 10px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 12px;
        }

        body.dark-mode .lang-btn {
            background: #3a3a3a;
            color: var(--primary);
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        .reader-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .verse-section {
            margin-bottom: 40px;
        }

        .verse-label {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .verse-arabic {
            font-size: 48px;
            font-weight: bold;
            line-height: 2;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arabic Typesetting', serif;
        }

        .verse-info {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 8px;
        }

        .translation-section {
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
        }

        body.dark-mode .translation-section {
            background: rgba(102, 126, 234, 0.2);
        }

        .translation-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .mic-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(135deg, var(--primary)15 0%, var(--secondary)15 100%);
            border-radius: 15px;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            margin: 0 auto 15px;
            display: block;
        }

        .mic-btn:hover {
            transform: scale(1.05);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            animation: pulse-mic 1s infinite;
        }

        @keyframes pulse-mic {
            0%, 100% { box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 10px 40px rgba(255, 107, 107, 0.6); }
        }

        .mic-label {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ecdc4;
        }

        .status-dot.recording {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .next-verse {
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .next-verse.show {
            display: block;
        }

        .next-verse-label {
            font-size: 12px;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .next-verse-text {
            font-size: 20px;
            color: #ff6b6b;
            font-weight: bold;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 997;
        }

        .menu-overlay.open {
            display: block;
        }

        @media (max-width: 600px) {
            .menu-panel {
                width: 80%;
                transform: translateX(80%);
            }

            .menu-panel.open {
                transform: translateX(0);
            }

            .verse-arabic {
                font-size: 36px;
            }

            .translation-section {
                font-size: 18px;
            }

            .mic-btn {
                width: 70px;
                height: 70px;
                font-size: 35px;
            }
        }
    </style>
</head>
<body>
    <!-- Menu Button -->
    <button class="menu-button" onclick="toggleMenu()">☰</button>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

    <!-- Menu Panel -->
    <div class="menu-panel" id="menuPanel">
        <button class="menu-close" onclick="closeMenu()">✕</button>
        
        <div class="menu-title">⚙️ الإعدادات</div>
        
        <div class="menu-title" style="margin-top: 30px; font-size: 14px;">🌐 اختر اللغة</div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('ar')">العربية</button>
            <button class="lang-btn" onclick="setLanguage('en')">English</button>
            <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
            <button class="lang-btn" onclick="setLanguage('nl')">Nederlands</button>
        </div>

        <div class="menu-title" style="margin-top: 30px;">🌙 الوضع الليلي</div>
        <div class="menu-item" onclick="toggleDarkMode()">
            <div class="toggle-switch" id="darkToggle"></div>
            <span>الوضع الليلي</span>
        </div>

        <div class="menu-title" style="margin-top: 30px;">📱 خيارات</div>
        <div class="menu-item" onclick="toggleArabic()">
            <div class="toggle-switch" id="hideArabic"></div>
            <span>إخفاء النص العربي</span>
        </div>

        <a href="/" style="display: block; margin-top: 30px; padding: 15px; background: var(--primary); color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold;">🏠 العودة للرئيسية</a>
    </div>

    <!-- Main Content -->
    <div class="reader-container">
        <!-- Microphone Section -->
        <div class="mic-section">
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">جاري الاتصال...</span>
            </div>
            <button class="mic-btn" id="micBtn" onclick="toggleMicrophone()" title="اضغط للاستماع">🎤</button>
            <div class="mic-label">اضغط الميكروفون أو ابدأ القراءة</div>
        </div>

        <!-- Current Verse -->
        <div class="verse-section">
            <div class="verse-label">الآية الحالية</div>
            <div class="verse-arabic" id="verseArabic">جاري الانتظار...</div>
            <div class="verse-info" id="verseInfo">-</div>
        </div>

        <!-- Translation -->
        <div class="translation-section">
            <div>
                <div class="translation-label" id="transLang">الترجمة الإنجليزية</div>
                <div id="translation">الترجمة ستظهر هنا</div>
            </div>
        </div>

        <!-- Next Verse Prediction -->
        <div class="next-verse" id="nextVerse">
            <div class="next-verse-label">🔮 الآية التالية (توقع)</div>
            <div class="next-verse-text" id="nextVerseText"></div>
        </div>
    </div>

    <script>
        let currentLang = "{{ lang }}" || "ar";
        let currentSurah = null;
        let currentAyahNumber = null;
        let hideArabic = false;
        let isDarkMode = false;
        const socket = io();
        let isListening = false;
        let recognition = null;

        // Load Quran data
        let quranData = {};
        fetch('/api/verses')
            .then(r => r.json())
            .then(data => {
                // Organize verses by surah
                data.verses.forEach(v => {
                    if (!quranData[v.surah]) {
                        quranData[v.surah] = [];
                    }
                    quranData[v.surah].push(v);
                });
                console.log('Quran data loaded:', quranData);
            });

        // Initialize Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ar-SA';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('recording');
                document.getElementById('statusDot').classList.add('recording');
                document.getElementById('statusText').textContent = 'جاري الاستماع...';
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    }
                }

                if (finalTranscript) {
                    searchVerseInCurrentSurah(finalTranscript.trim());
                }
            };

            recognition.onerror = (event) => {
                if (event.error !== 'no-speech') {
                    console.error('Recognition error:', event.error);
                }
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('recording');
                document.getElementById('statusDot').classList.remove('recording');
                
                // Restart automatically
                setTimeout(() => {
                    if (recognition) {
                        recognition.start();
                    }
                }, 1000);
            };
        }

        // Search verse in current surah first, then other surahs
        function searchVerseInCurrentSurah(text) {
            socket.emit('recognize_verse', { text: text });
        }

        // Socket Events
        socket.on('connect', () => {
            document.getElementById('statusDot').style.background = '#4ecdc4';
            document.getElementById('statusText').textContent = '✅ متصل';
        });

        socket.on('verse_found', (data) => {
            const v = data.verse;
            
            // Save current surah and ayah
            currentSurah = v.surah;
            currentAyahNumber = parseInt(v.ayah);
            
            if (!hideArabic) {
                document.getElementById('verseArabic').textContent = v.ar;
            } else {
                document.getElementById('verseArabic').textContent = '';
            }
            
            let translation = '';
            let langLabel = 'الترجمة الإنجليزية';
            
            if (currentLang === 'ar') {
                translation = v.ar;
                langLabel = 'الآية العربية';
            } else if (currentLang === 'en') {
                translation = v.en || '';
                langLabel = 'English Translation';
            } else if (currentLang === 'fr') {
                translation = v.fr || v.en || '';
                langLabel = 'Traduction Française';
            } else if (currentLang === 'nl') {
                translation = v.nl || v.en || '';
                langLabel = 'Nederlandse Vertaling';
            }
            
            document.getElementById('translation').textContent = translation;
            document.getElementById('transLang').textContent = langLabel;
            document.getElementById('verseInfo').textContent = `السورة ${v.surah} : الآية ${v.ayah}`;
            document.getElementById('statusText').textContent = '✅ متطابقة';

            // Show next verse prediction
            showNextVerse(v.surah, parseInt(v.ayah));
        });

        socket.on('no_verse_found', () => {
            document.getElementById('statusText').textContent = '🔍 بحث...';
        });

        // Show next verse (prediction)
        function showNextVerse(surah, ayahNum) {
            const nextAyahNum = ayahNum + 1;
            
            // Check if next verse exists in current surah
            if (quranData[surah] && quranData[surah][nextAyahNum - 1]) {
                const nextVerse = quranData[surah][nextAyahNum - 1];
                document.getElementById('nextVerseText').textContent = nextVerse.ar.substring(0, 100) + '...';
                document.getElementById('nextVerse').classList.add('show');
            } else {
                document.getElementById('nextVerse').classList.remove('show');
            }
        }

        // Menu Functions
        function toggleMenu() {
            const panel = document.getElementById('menuPanel');
            const overlay = document.getElementById('menuOverlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        function closeMenu() {
            document.getElementById('menuPanel').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('open');
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (recognition) {
                recognition.lang = lang === 'ar' ? 'ar-SA' : 
                                  lang === 'en' ? 'en-US' :
                                  lang === 'fr' ? 'fr-FR' : 'nl-NL';
            }
            closeMenu();
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            document.getElementById('darkToggle').classList.toggle('active');
        }

        function toggleArabic() {
            hideArabic = !hideArabic;
            document.getElementById('hideArabic').classList.toggle('active');
        }

        function toggleMicrophone() {
            if (recognition) {
                if (isListening) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            }
        }

        // Start listening automatically
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (recognition) {
                    recognition.start();
                }
            }, 500);
        });

        // Request microphone permission
        navigator.mediaDevices.getUserMedia({ audio: true })
            .catch(err => {
                console.log('Microphone permission needed');
            });
    </script>
</body>
</html>
