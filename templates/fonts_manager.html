<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 إدارة الخطوط - Fonts Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 800px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .header p {
            color: #999;
            font-size: 14px;
        }

        .upload-section {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 40px;
            transition: all 0.3s;
        }

        .upload-section:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #667eea25 0%, #764ba225 100%);
        }

        .upload-section.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #667eea35 0%, #764ba235 100%);
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
            margin-bottom: 20px;
        }

        #fontFile {
            display: none;
        }

        .btn-upload {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .fonts-list {
            margin-top: 40px;
        }

        .fonts-title {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            text-align: right;
        }

        .font-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid #667eea;
        }

        .font-name {
            font-weight: bold;
            color: #333;
        }

        .font-preview {
            font-size: 14px;
            color: #999;
        }

        .btn-delete {
            padding: 8px 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #e3f2fd;
            border-right: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1565c0;
            font-size: 13px;
            line-height: 1.6;
        }

        .btn-back {
            padding: 12px 30px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 30px;
        }

        .btn-back:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 28px;
            }

            .upload-section {
                padding: 25px;
            }

            .font-item {
                flex-direction: column;
                gap: 10px;
            }

            .btn-delete {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📝 إدارة الخطوط</h1>
            <p>أضف خطوط قرآنية احترافية جديدة</p>
        </div>

        <!-- Message -->
        <div id="message" class="message"></div>

        <!-- Info Box -->
        <div class="info-box">
            <strong>📌 معلومات:</strong><br>
            يمكنك تحميل ملفات خطوط بصيغة TTF أو OTF<br>
            الخطوط المحملة ستظهر في إعدادات التطبيق
        </div>

        <!-- Upload Section -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📤</div>
            <div class="upload-text">سحب الملفات هنا أو اضغط للاختيار</div>
            <div class="upload-hint">صيغ مدعومة: TTF, OTF (الحد الأقصى: 10MB)</div>
            <button class="btn-upload" onclick="document.getElementById('fontFile').click()">
                اختر ملف الخط
            </button>
            <input type="file" id="fontFile" accept=".ttf,.otf" onchange="uploadFont()">
        </div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل الخط...</p>
        </div>

        <!-- Fonts List -->
        <div class="fonts-list">
            <div class="fonts-title">✅ الخطوط المحملة</div>
            <div id="fontsList">
                <p style="text-align: center; color: #999;">جاري تحميل قائمة الخطوط...</p>
            </div>
        </div>

        <!-- Back Button -->
        <button class="btn-back" onclick="goBack()">🏠 العودة</button>
    </div>

    <script>
        // Load fonts list on page load
        window.addEventListener('load', loadFonts);

        // Drag and drop
        const uploadSection = document.getElementById('uploadSection');

        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.name.endsWith('.ttf') || file.name.endsWith('.otf')) {
                    uploadFileToServer(file);
                } else {
                    showMessage('⚠️ صيغة الملف غير مدعومة. استخدم TTF أو OTF', 'error');
                }
            }
        });

        function uploadFont() {
            const fileInput = document.getElementById('fontFile');
            if (fileInput.files.length > 0) {
                uploadFileToServer(fileInput.files[0]);
                fileInput.value = ''; // Reset input
            }
        }

        function uploadFileToServer(file) {
            // Check file size
            if (file.size > 10 * 1024 * 1024) {
                showMessage('❌ حجم الملف كبير جداً (الحد الأقصى: 10MB)', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('loading').classList.add('show');

            fetch('/api/fonts', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').classList.remove('show');
                
                if (data.error) {
                    showMessage('❌ ' + data.error, 'error');
                } else {
                    showMessage('✅ تم تحميل الخط بنجاح!', 'success');
                    setTimeout(loadFonts, 1000);
                }
            })
            .catch(error => {
                document.getElementById('loading').classList.remove('show');
                showMessage('❌ حدث خطأ أثناء التحميل', 'error');
                console.error('Error:', error);
            });
        }

        function loadFonts() {
            fetch('/api/fonts')
                .then(response => response.json())
                .then(data => {
                    const fontsList = document.getElementById('fontsList');
                    
                    if (data.fonts.length === 0) {
                        fontsList.innerHTML = '<p style="text-align: center; color: #999;">لم يتم تحميل أي خطوط حتى الآن</p>';
                        return;
                    }

                    fontsList.innerHTML = data.fonts.map(font => `
                        <div class="font-item">
                            <button class="btn-delete" onclick="deleteFont('${font}')">حذف</button>
                            <div>
                                <div class="font-name">${font}</div>
                                <div class="font-preview">معاينة: بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(error => {
                    console.error('Error loading fonts:', error);
                });
        }

        function deleteFont(fontName) {
            if (confirm(`هل تريد حذف الخط: ${fontName}؟`)) {
                // Implementation for delete would go here
                showMessage('⚠️ حذف الخطوط قادم قريباً', 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }

        function goBack() {
            window.location.href = '/settings';
        }
    </script>
</body>
</html>
