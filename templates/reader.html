<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 قارئ الترجمة - Reader</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --dark-bg: #1a1a1a;
            --light-bg: #ffffff;
            --dark-text: #ffffff;
            --light-text: #333333;
        }

        body {
            font-family: 'Arabic Typesetting', 'Simplified Arabic', Arial, sans-serif;
            background: var(--light-bg);
            color: var(--light-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--dark-text);
        }

        .menu-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .menu-button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .menu-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
            transform: translateX(300px);
            transition: transform 0.3s;
            z-index: 998;
            overflow-y: auto;
            padding: 20px;
        }

        body.dark-mode .menu-panel {
            background: #2a2a2a;
            color: white;
        }

        .menu-panel.open {
            transform: translateX(0);
        }

        .menu-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--primary);
        }

        .menu-title {
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            text-align: right;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        body.dark-mode .menu-item {
            background: #3a3a3a;
        }

        .menu-item:hover {
            background: var(--primary);
            color: white;
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            position: relative;
            cursor: pointer;
        }

        .toggle-switch.active {
            background: var(--primary);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            right: 2px;
            transition: right 0.3s;
        }

        .toggle-switch.active::after {
            right: 26px;
        }

        .lang-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .lang-btn {
            padding: 10px;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 12px;
        }

        body.dark-mode .lang-btn {
            background: #3a3a3a;
            color: var(--primary);
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        .reader-container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .verse-section {
            margin-bottom: 40px;
        }

        .verse-label {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .verse-arabic {
            font-size: 48px;
            font-weight: bold;
            line-height: 2;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arabic Typesetting', serif;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verse-info {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .translation-section {
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 30px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
            animation: fadeIn 0.5s;
        }

        body.dark-mode .translation-section {
            background: rgba(102, 126, 234, 0.1);
        }

        .translation-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .mic-indicator {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            opacity: 0.7;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ecdc4;
        }

        .status-dot.recording {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 997;
        }

        .menu-overlay.open {
            display: block;
        }

        @media (max-width: 600px) {
            .menu-panel {
                width: 80%;
                transform: translateX(80%);
            }

            .menu-panel.open {
                transform: translateX(0);
            }

            .verse-arabic {
                font-size: 36px;
            }

            .translation-section {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Menu Button -->
    <button class="menu-button" onclick="toggleMenu()">☰</button>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

    <!-- Menu Panel -->
    <div class="menu-panel" id="menuPanel">
        <button class="menu-close" onclick="closeMenu()">✕</button>
        
        <div class="menu-title">⚙️ الإعدادات</div>
        
        <div class="menu-title" style="margin-top: 30px; font-size: 14px;">🌐 اختر اللغة</div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('ar')">العربية</button>
            <button class="lang-btn" onclick="setLanguage('en')">English</button>
            <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
            <button class="lang-btn" onclick="setLanguage('nl')">Nederlands</button>
        </div>

        <div class="menu-title" style="margin-top: 30px;">🌙 الوضع الليلي</div>
        <div class="menu-item" onclick="toggleDarkMode()">
            <div class="toggle-switch" id="darkToggle"></div>
            <span>الوضع الليلي</span>
        </div>

        <div class="menu-title" style="margin-top: 30px;">📱 خيارات</div>
        <div class="menu-item" onclick="toggleArabic()">
            <div class="toggle-switch" id="hideArabic"></div>
            <span>إخفاء النص العربي</span>
        </div>

        <a href="/" style="display: block; margin-top: 30px; padding: 15px; background: var(--primary); color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold;">🏠 العودة للرئيسية</a>
    </div>

    <!-- Main Content -->
    <div class="reader-container">
        <div class="verse-section">
            <div class="verse-label">الآية الحالية</div>
            <div class="verse-arabic" id="verseArabic">جاري الانتظار...</div>
            <div class="verse-info" id="verseInfo">-</div>
        </div>

        <div class="translation-section">
            <div>
                <div class="translation-label" id="transLang">الترجمة الإنجليزية</div>
                <div id="translation">الترجمة ستظهر هنا</div>
            </div>
        </div>
    </div>

    <!-- Mic Indicator -->
    <div class="mic-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">جاري الاتصال...</span>
    </div>

    <script>
        let currentLang = "{{ lang }}" || "ar";
        const socket = io();
        let isListening = false;
        let recognition = null;
        let isDarkMode = false;
        let hideArabic = false;

        const surahNames = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", 
            "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", 
            "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", 
            "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", 
            "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", 
            "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", 
            "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", 
            "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", 
            "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", 
            "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", 
            "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", 
            "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", 
            "البلد", "الشمس", "القمر", "الضحى", "الشرح", "التين", "العلق", "القدر", 
            "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", 
            "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", 
            "الفلق", "الناس"];

        // Initialize Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'ar-SA';

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('statusDot').classList.add('recording');
                document.getElementById('statusText').textContent = 'جاري الاستماع...';
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    }
                }

                if (finalTranscript) {
                    socket.emit('recognize_verse', { 
                        text: finalTranscript.trim(),
                        surah: 1,
                        lang: currentLang
                    });
                }
            };

            recognition.onerror = (event) => {
                if (event.error !== 'no-speech') {
                    document.getElementById('statusText').textContent = '⚠️ خطأ';
                }
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('statusDot').classList.remove('recording');
                
                // Restart automatically
                setTimeout(() => {
                    if (recognition) {
                        recognition.start();
                    }
                }, 1000);
            };
        }

        // Socket Events
        socket.on('connect', () => {
            document.getElementById('statusDot').style.background = '#4ecdc4';
            document.getElementById('statusText').textContent = '✅ متصل';
        });

        socket.on('current_verse_update', (data) => {
            const v = data.verse;
            const surahNum = parseInt(data.surah);
            
            if (!hideArabic) {
                document.getElementById('verseArabic').textContent = v.ar;
            } else {
                document.getElementById('verseArabic').textContent = '';
            }
            
            // Update translation
            let translation = v.translation || '';
            document.getElementById('translation').textContent = translation;
            
            // Update verse info
            document.getElementById('verseInfo').textContent = `السورة ${surahNames[surahNum - 1]} : الآية ${v.ayah}`;
            document.getElementById('statusText').textContent = '✅ متطابقة';
        });

        socket.on('no_verse_found', () => {
            document.getElementById('statusText').textContent = '🔍 بحث...';
        });

        // Menu Functions
        function toggleMenu() {
            const panel = document.getElementById('menuPanel');
            const overlay = document.getElementById('menuOverlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        function closeMenu() {
            document.getElementById('menuPanel').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('open');
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update translation label
            if (lang === 'ar') {
                document.getElementById('transLang').textContent = 'الآية العربية';
            } else if (lang === 'en') {
                document.getElementById('transLang').textContent = 'English Translation';
            } else if (lang === 'fr') {
                document.getElementById('transLang').textContent = 'Traduction Française';
            } else if (lang === 'nl') {
                document.getElementById('transLang').textContent = 'Nederlandse Vertaling';
            }
            
            if (recognition) {
                recognition.lang = lang === 'ar' ? 'ar-SA' : 
                                  lang === 'en' ? 'en-US' :
                                  lang === 'fr' ? 'fr-FR' : 'nl-NL';
            }
            closeMenu();
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            document.getElementById('darkToggle').classList.toggle('active');
        }

        function toggleArabic() {
            hideArabic = !hideArabic;
            document.getElementById('hideArabic').classList.toggle('active');
        }

        // Start listening automatically
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (recognition) {
                    recognition.start();
                }
            }, 500);
        });

        // Request microphone permission
        navigator.mediaDevices.getUserMedia({ audio: true })
            .catch(err => {
                console.log('Microphone permission needed');
            });
    </script>
</body>
</html>
